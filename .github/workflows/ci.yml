name: CI

on:
  pull_request:
    branches: [develop]

jobs:
  note_linting:
    name: Note Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for TODO/FIXME/HACK notes
        run: |
          NOTES=$(rg -n "TODO|FIXME|HACK" lua/ plugin/ --type lua || true)
          if [ -n "$NOTES" ]; then
            echo "::warning::Found development notes:"
            echo "$NOTES"
          fi

  lint:
    name: Lua Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: luacheck lua/ plugin/ --globals vim --no-max-line-length

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.10.4

      - name: Run tests
        run: make test
