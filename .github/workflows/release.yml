name: Release

on:
  push:
    branches: [main]

jobs:
  note_linting:
    name: Note Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for TODO/FIXME/HACK notes
        run: |
          NOTES=$(rg -n "TODO|FIXME|HACK" lua/ plugin/ --type lua || true)
          if [ -n "$NOTES" ]; then
            echo "::error::Development notes must be resolved before release:"
            echo "$NOTES"
            exit 1
          fi

  lint:
    name: Lua Lint
    runs-on: ubuntu-latest
    needs: [note_linting]
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: luacheck lua/ plugin/ --globals vim --no-max-line-length

  test:
    name: Plugin Load Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.10.4

      - name: Verify plugin loads
        run: |
          nvim --headless -u NONE \
            --cmd "set runtimepath+=$(pwd)" \
            -c "lua require('neocode').setup({}); print('setup: OK')" \
            -c "lua local s = require('neocode.study'); print('plans: ' .. table.concat(s.available_plans(), ', '))" \
            -c "lua local p = require('neocode.study').load_plan('blind75'); print(p.name .. ': ' .. #p.categories .. ' categories')" \
            -c "lua local p = require('neocode.study').load_plan('neetcode150'); print(p.name .. ': ' .. #p.categories .. ' categories')" \
            -c "lua local p = require('neocode.study').load_plan('grind75'); print(p.name .. ': ' .. #p.categories .. ' categories')" \
            -c "lua require('neocode.ui'); print('ui: OK')" \
            -c "lua require('neocode.ui.html'); print('html: OK')" \
            -c "lua require('neocode.runner'); print('runner: OK')" \
            -c "q"

      - name: Verify command registration
        run: |
          nvim --headless -u NONE \
            --cmd "set runtimepath+=$(pwd)" \
            -c "source plugin/neocode.lua" \
            -c "lua require('neocode').setup({})" \
            -c "Neocode plan list" \
            -c "q"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag and release
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
